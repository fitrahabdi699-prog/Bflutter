name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        required: true
      website_url:
        required: true
      app_name:
        required: true
        default: 'myapp'
      app_color:
        required: false
        default: '2196F3'
      package_name:
        required: false
        default: ''
      icon_filename:
        required: false
        default: ''

jobs:
  build:
    name: ${{ github.event.inputs.build_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics --no-cli-animations

      - name: Sanitize inputs & create project
        id: setup
        run: |
          # ── nama project: lowercase, hanya a-z0-9_, awali huruf, max 30
          RAW='${{ github.event.inputs.app_name }}'
          NAME=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/^[^a-z]*//' | sed 's/__*/_/g' | cut -c1-30 | sed 's/_*$//')
          [ -z "$NAME" ] && NAME="myapp"
          echo "NAME=$NAME" >> $GITHUB_ENV

          # ── package name
          PKG='${{ github.event.inputs.package_name }}'
          [ -z "$PKG" ] && PKG="com.apkforge.$(echo ${NAME} | tr -d '_')"
          PKG=$(echo "$PKG" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9.]//g')
          # pastikan format org.name
          DOTS=$(echo "$PKG" | tr -cd '.' | wc -c)
          [ "$DOTS" -lt 1 ] && PKG="com.apkforge.${PKG}"
          echo "PKG=$PKG" >> $GITHUB_ENV

          # ── warna
          COLOR='${{ github.event.inputs.app_color }}'
          COLOR=$(echo "$COLOR" | sed 's/#//')
          [ -z "$COLOR" ] && COLOR="2196F3"
          echo "COLOR=$COLOR" >> $GITHUB_ENV

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "→ name=$NAME  pkg=$PKG  color=$COLOR"

      - name: Create Flutter project
        run: |
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          [ -z "$ORG" ] && ORG="com.apkforge"
          flutter create --org "$ORG" --project-name "$NAME" --platforms android app

      - name: Write main.dart
        run: |
          URL='${{ github.event.inputs.website_url }}'
          TITLE='${{ github.event.inputs.app_name }}'
          # escape single quotes in title
          TITLE_SAFE=$(echo "$TITLE" | sed "s/'/\\\'/g")

          cat > app/lib/main.dart << DART
import 'package:flutter/material.dart';
import 'package:webview_flutter/webview_flutter.dart';

void main() {
  WidgetsFlutterBinding.ensureInitialized();
  runApp(const MyApp());
}

class MyApp extends StatelessWidget {
  const MyApp({super.key});
  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: '${TITLE_SAFE}',
      debugShowCheckedModeBanner: false,
      theme: ThemeData(
        colorScheme: ColorScheme.fromSeed(
          seedColor: const Color(0xFF${COLOR}),
        ),
        useMaterial3: true,
      ),
      home: const HomePage(),
    );
  }
}

class HomePage extends StatefulWidget {
  const HomePage({super.key});
  @override
  State<HomePage> createState() => _HomePageState();
}

class _HomePageState extends State<HomePage> {
  late final WebViewController _ctrl;
  bool _loading = true;

  @override
  void initState() {
    super.initState();
    _ctrl = WebViewController()
      ..setJavaScriptMode(JavaScriptMode.unrestricted)
      ..setNavigationDelegate(NavigationDelegate(
        onPageStarted: (_) => setState(() => _loading = true),
        onPageFinished: (_) => setState(() => _loading = false),
        onNavigationRequest: (_) => NavigationDecision.navigate,
      ))
      ..loadRequest(Uri.parse('${URL}'));
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: Text('${TITLE_SAFE}'),
        backgroundColor: const Color(0xFF${COLOR}),
        foregroundColor: Colors.white,
        elevation: 0,
      ),
      body: Stack(
        children: [
          WebViewWidget(controller: _ctrl),
          if (_loading)
            const Center(child: CircularProgressIndicator()),
        ],
      ),
    );
  }
}
DART

      - name: Add webview_flutter
        working-directory: app
        run: flutter pub add webview_flutter

      - name: Fix AndroidManifest
        run: |
          M="app/android/app/src/main/AndroidManifest.xml"
          grep -q 'INTERNET' "$M" || \
            sed -i 's|<manifest |<manifest |; s|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$M"

      - name: Set icon
        if: ${{ github.event.inputs.icon_filename != '' }}
        run: |
          curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/${{ github.event.inputs.icon_filename }}" \
            -o /tmp/icon.png || { echo "Icon download failed, skipping"; exit 0; }

          which convert && \
          for RES in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            DIR=$(cut -d: -f1 <<< "$RES"); SIZE=$(cut -d: -f2 <<< "$RES")
            convert /tmp/icon.png -resize "${SIZE}x${SIZE}" \
              "app/android/app/src/main/res/mipmap-${DIR}/ic_launcher.png" 2>/dev/null || true
            convert /tmp/icon.png -resize "${SIZE}x${SIZE}" \
              "app/android/app/src/main/res/mipmap-${DIR}/ic_launcher_round.png" 2>/dev/null || true
          done || cp /tmp/icon.png app/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Build APK
        working-directory: app
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --dart-define=FLUTTER_WEB_AUTO_DETECT=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id }}
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
