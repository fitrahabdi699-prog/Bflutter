name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID unik'
        required: true
      website_url:
        description: 'URL Website yang akan dibungkus'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'MyApp'
      app_color:
        description: 'Warna utama (hex)'
        required: false
        default: '#2196F3'
      package_name:
        description: 'Package name Android'
        required: false
        default: 'com.webtoapp.myapp'
      icon_base64:
        description: 'Ikon base64 (opsional)'
        required: false
        default: ''

jobs:
  build:
    name: ${{ github.event.inputs.build_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: 📦 Generate Flutter Project
        run: |
          # Sanitize package name
          PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$PKG" ] || [ "$PKG" = "com.webtoapp.myapp" ]; then
            PKG="com.webtoapp.app${{ github.event.inputs.build_id }}"
          fi
          # Ganti karakter ilegal di package name
          PKG=$(echo "$PKG" | tr -cd 'a-zA-Z0-9._' | tr '.' '.')
          echo "PACKAGE_NAME=$PKG" >> $GITHUB_ENV

          # Nama folder aman untuk Flutter
          SAFE_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr -cd 'a-zA-Z0-9_')
          [ -z "$SAFE_NAME" ] && SAFE_NAME="myapp"
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

          flutter create --org "${PKG%.*}" --project-name "$SAFE_NAME" --platforms android myapp_project

      - name: 📝 Replace main.dart (WebView)
        run: |
          cat > myapp_project/lib/main.dart << 'DART_EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: const Color(APP_COLOR_PLACEHOLDER)),
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});
            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onNavigationRequest: (req) => NavigationDecision.navigate,
                ))
                ..loadRequest(Uri.parse('WEBSITE_URL_PLACEHOLDER'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('APP_NAME_PLACEHOLDER'),
                  backgroundColor: const Color(APP_COLOR_PLACEHOLDER),
                  foregroundColor: Colors.white,
                ),
                body: WebViewWidget(controller: _controller),
              );
            }
          }
          DART_EOF

          # Ganti placeholder
          COLOR_HEX="${{ github.event.inputs.app_color }}"
          COLOR_HEX="${COLOR_HEX#'#'}"
          COLOR_INT="0xFF${COLOR_HEX}"

          sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.inputs.app_name }}|g" myapp_project/lib/main.dart
          sed -i "s|APP_COLOR_PLACEHOLDER|${COLOR_INT}|g"                        myapp_project/lib/main.dart
          sed -i "s|WEBSITE_URL_PLACEHOLDER|${{ github.event.inputs.website_url }}|g" myapp_project/lib/main.dart

      - name: 🔧 Add webview_flutter dependency
        working-directory: myapp_project
        run: flutter pub add webview_flutter

      - name: 🔑 Update AndroidManifest (internet permission)
        run: |
          MANIFEST="myapp_project/android/app/src/main/AndroidManifest.xml"
          # Tambahkan izin internet sebelum tag <application>
          sed -i 's|<manifest|<manifest|' "$MANIFEST"
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"

      - name: 🖼️ Set App Icon (jika ada)
        if: ${{ github.event.inputs.icon_base64 != '' }}
        run: |
          echo "${{ github.event.inputs.icon_base64 }}" | base64 -d > /tmp/icon.png
          # Salin ke semua resolusi mipmap
          for DIR in myapp_project/android/app/src/main/res/mipmap-*; do
            cp /tmp/icon.png "$DIR/ic_launcher.png" 2>/dev/null || true
          done

      - name: 🏗️ Build APK (release)
        working-directory: myapp_project
        run: |
          flutter build apk --release --no-tree-shake-icons 2>&1 | tail -30

      - name: ☁️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id }}
          path: myapp_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
